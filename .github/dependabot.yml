# Dependabot version updates. The only Dependabot-tracked ecosystem here is the GitHub Actions pinned in the workflows;
# keep them current via a single grouped PR per month. Security alerts/updates are configured separately in the repo
# settings, not here.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - "*"
