name: vet

# Static code quality + packaging: the "vet" sub-gate. One target, one badge.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vet:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc }
          - { os: ubuntu-latest, cc: clang }
          - { os: macos-latest, cc: clang }
    steps:
      - uses: actions/checkout@v4
      - name: Install dev dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sh scripts/install-debian-dev-deps.sh vet
      - name: Install dev dependencies (macOS)
        if: runner.os == 'macOS'
        run: sh scripts/install-macos-dev-deps.sh vet
      - name: Vet
        run: make vet CC=${{ matrix.cc }}
