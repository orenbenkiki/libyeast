name: vet

# Static code quality + packaging: the "vet" sub-gate. One target, one badge.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vet:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc }
          - { os: ubuntu-latest, cc: clang }
          - { os: macos-latest, cc: clang }
    steps:
      - uses: actions/checkout@v4
      - name: Update apt index
        if: runner.os == 'Linux'
        run: sudo apt-get update
      - name: Install dependencies
        run: make install-deps-vet
      - name: Vet
        run: make vet CC=${{ matrix.cc }}
