name: test

# The C parser tests pass across compilers/OSes: the "test" sub-gate. Pure C — the coverage gate rides with gh-pages.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unix:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc }
          - { os: ubuntu-latest, cc: clang }
          - { os: macos-latest, cc: clang }
    steps:
      - uses: actions/checkout@v4
      - name: Update apt index
        if: runner.os == 'Linux'
        run: sudo apt-get update
      - name: Install dependencies
        run: make install-deps
      - name: C tests
        run: make test CC=${{ matrix.cc }}

  # Windows/MSVC: the Makefile needs a Unix shell, so drive CMake directly to run the tests.
  windows:
    name: windows-latest / msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Set up the MSVC toolchain so the AddressSanitizer runtime DLL is on PATH for the Debug tests.
      - uses: ilammy/msvc-dev-cmd@v1
      - run: cmake -S . -B build
      # Debug is AddressSanitizer-instrumented (heap/stack overflow + use-after-free); Release is the plain smoke build.
      - run: cmake --build build --config Debug
      - run: ctest --test-dir build -C Debug --output-on-failure
      - run: cmake --build build --config Release
      - run: ctest --test-dir build -C Release --output-on-failure
