# SPDX-License-Identifier: MIT
#
# The error messages libyeast emits, keyed by the code a grammar `(cut)` or `(error)` names. Each says what was
# expected, never what was found — the byte that failed comes back as the first unparsed token behind the error. This
# file is the single source: the interpreter reads it, and the C parser's message table is generated from it (gated
# against drift), so the mapping is never hand-duplicated.
#
# Every code here is named by a `(cut)` or an `(error)` in `yeast-spec-1.2.yaml`, and every one is shown to fire by a
# fixture whose expected output carries its text — a commit point nothing reaches is a message nothing has checked.
#
# A byte that is no codepoint at all belongs to none of this: it is the decoder's, below the grammar, and its message
# will be a hand-written one in `src/messages.c` rather than an entry here. There is no such message yet, the parser
# core that would emit it being unbuilt; `PLAN.md` §4 says what deciding it decides.

# A required construct is absent.
MISSING_VALUE: "A mapping value is required after ':'"
MISSING_KEY: "A mapping key is required after '?'"
MISSING_ENTRY: "A sequence entry is required after '-'"
MISSING_ANCHOR_NAME: "An anchor name is required after '&'"
MISSING_ALIAS_NAME: "An anchor name is required after '*'"
MISSING_DIRECTIVE: "A directive name is required after '%'"

# A construct was opened and never closed.
UNTERMINATED_DOUBLE_QUOTE: "Unterminated double-quoted scalar"
UNTERMINATED_SINGLE_QUOTE: "Unterminated single-quoted scalar"
UNTERMINATED_FLOW_SEQ: "Unterminated flow sequence"
UNTERMINATED_FLOW_MAP: "Unterminated flow mapping"

# An escape or its digits are malformed.
ESC_X2: "A '\\x' escape requires two hexadecimal digits"
ESC_U4: "A '\\u' escape requires four hexadecimal digits"
ESC_U8: "A '\\U' escape requires eight hexadecimal digits"
ESC_URI: "A '%' escape in a tag requires two hexadecimal digits"
INVALID_ESCAPE: "Invalid escape sequence"

# A directive is malformed.
YAML_DIRECTIVE: "The %YAML directive requires a version, e.g. %YAML 1.2"
TAG_DIRECTIVE: "The %TAG directive requires a handle and a prefix"

# A marker or a header carries trailing junk, where only a comment or the end of the line may follow.
BLOCK_HEADER: "A block scalar header requires a comment or line break"
DOCUMENT_END: "A '...' document-end marker requires a comment or line break"

# The input holds something a stream cannot.
TRAILING_CONTENT: "A stream holds only documents, directives and comments"
