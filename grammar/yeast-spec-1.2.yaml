#===============================================================================
#
# This YAML grammar was manually derived from
# https://github.com/yaml/yaml-grammar/blob/master/yaml-spec-1.2.yaml
# to add the token actions, which are based on the Haskell YAML reference parser
# https://github.com/orenbenkiki/yamlreference
#
# It is the grammar libyeast is generated from: a YAML parser in C whose
# conformance is a property of its generator rather than of its test suite.
# Everything the parser does is derived from this file — the character classes
# it branches on, the productions it recognizes, and the tokens it emits.
#
# The grammar it derives from says how to recognize YAML. It does not say what
# to emit, and it cannot: it writes the indicator characters inline, so it has
# nowhere to record that a quotation mark opens a scalar as an indicator but is
# meta inside an escape, and it names no token at all. This grammar restores
# that structure — each indicator character is reached through the rule that
# names it — and annotates the rules with the tokens they emit.
#
# Those tokens are yeast, the reference parser's token model: zero-width markers
# bracketing the interesting rules, and every consumed character classified. The
# codes are identical to that parser's, so the two can be compared token for
# token.
#
# The additions are additions, and a check proves it: erase the token actions,
# put the indicator characters back where they were written inline, and what
# remains is the grammar this was derived from, rule for rule. A departure from
# it must be declared, with its reason, or the build fails.
#
#===============================================================================

#===============================================================================
#
#   = Syntax Guide =
#
# The following is an explanation of the various EBNF/DSL syntax forms used in
# this grammar. The original YAML 1.2 spec uses an EBNF form that has more than
# a couple oddities. This file tries to make as much sense of them as possible.
# Each rule that introduces a new syntax is preceded by an explanation.
#
# There are 211 rules in the YAML 1.2 spec. This grammar file has 211 sections,
# one for each rule. The overall structure of this file is a big mapping with
# 2 mapping pairs for each grammar rule. Each rule group looks like this:
#
#   :rule-number: rule-name
#   # original-spec-rule-as-a-comment
#
#   rule-name: rule-definition
#
# The first pair is just for indexing the rule (by rule number) back to the 1.2
# spec. The rule definition is the important part. Complex definitions are data
# structures mostly comprised of other rule-names. The simplest rules point to
# single characters. This forms a top-down grammar where the top is the last
# rule, #211.
#
#   == Rule Names ==
#
# A rule name consists of groups of lower case characters and numbers separated
# by dashes (`-`).
#
# Each rule name has a 1 or 2 character prefix indicating the rule type.
#
# Example rule names:
#
#   * nb-foo-bar
#   * nb+foo-bar
#   * nb-foo-bar(n)
#   * nb-foo-bar(n,c)
#
#   === Rule Name Prefixes ===
#
# The rule type prefixes are:
#
#   e  -- Empty (matches no characters)
#   c  -- Character (match one single character)
#   b  -- Break (match a single line break character)
#   nb -- Non-break (match a single non-break character)
#   s  -- Space (match a single whitespace character)
#   ns -- Non-space (match a single non-space character)
#   l  -- Line (match a complete line)
#
# And also (where X and Y are each one of the above prefixes):
#
#   X-Y  -- Match starting with an X- match and ending with a Y- match
#   X+   -- Match X where indentation is greater than n
#   X-Y+ -- Match X-Y where indentation is greater than n
#
#   == Rules Variables ==
#
# Some rules are defined with variable arguments indicating that they should be
# passed values when being used. There are 4 distinct variables used in the
# YAML 1.2 grammar.
#
#   n -- Current indentation level. An integer indicating the number of spaces.
#
#   m -- Additional indentation level. An integer indicating number of spaces.
#
#   c -- Current context. String that is one of:
#     * "block-in"
#     * "block-out"
#     * "block-key"
#     * "flow-in"
#     * "flow-out"
#     * "flow-key"
#
#   t -- How to treat whitespace after a literal scalar. One of:
#     * "strip"
#     * "clip"
#     * "keep"
#
# Where and how these variables are set is a bit inconsistent. Some are set by
# explicitly in rules that act like function calls. For example, The starting
# values of n (-1) and c ("block-in") are set in rule 207.
#
# The m variable is set explicitly in rules 183 and 187, albeit by an undefined
# special rule called <auto-detect-indent>. In rules like 185 it assumes that m
# is stored as a state/stack variable and has been set somewhere else.
#
# The t variable is set using functional constructs in rule 164, depending on
# the value of a c-chomping-indicator rule.
#
#   == Special Rule Names ==
#
# A handful of rule names are words inside angle brackets. These are called
# "special rules". They are not defined in the grammar. Each of these rules is
# an assertion that doesn't consume any text in the parse. They are:
#
#   * <empty>
#     Always matches.
#
#   * <start-of-line>
#     Current parse position is at the start of a line.
#
#   * <end-of-stream>
#     Current parse position is at the end of the input stream.
#
#   * <auto-detect-indent>
#     Detect the number of characters of new indentation.
#
#   == Rule Definitions ==
#
# The rule definitions here are expressed as YAML data structures where the
# scalar values can be:
#
#   * A rule name
#   * A literal character (always single quoted for clarity)
#   * Some special DSL forms
#
# The various DSL forms were chosen carefully to be easily read and understood
# by the people reading it. The rest of this section describes those forms.
#
#   === Special Syntax Used ===
#
# There are some syntax conventions used for clarity. Everything is valid YAML.
# Certain things could be expressed in YAML different ways. For instance a
# single character to be matched could be unquoted, single-quoted or
# double-quoted. If the intent is to match a single character, it is single
# quoted.
#
#   * unquoted-word         -- Usually a rule name
#   * unquoted-single-char  -- A variable name
#   * single-quoted-char    -- A character to match
#   * double-quoted-string  -- A literal string value
#   * (...)                 -- A parsing function
#   * <...>                 -- A special rule name
#
#   === Hex Codes ===
#
# Hex codes are scalars beginning with an `x` followed by an even number of
# uppercase hexadecimal digits. Since hex codes represent characters they are
# encoded in single quotes.
#
# There are hex ranges as well, which consist of a pair hex codes.
#
#   === Rule Functions ===
#
# The grammar uses these functions. The function name is always in parentheses.
# The name is a key of a single pair mapping.
#
#   * (any)
#     One of the rules in the group must match.
#
#   * (all)
#     All of the rules in the group must match.
#
#   * (+++)
#     The rule must match 1 or more times.
#
#   * (***)
#     The rule must match 0 or more times.
#
#   * (???)
#     The rule must match 0 or 1 times.
#
#   * ({x})
#     The rule must match x times, where x is an integer or a variable.
#
#   * (===)
#     Positive look-ahead assertion.
#
#   * (!==)
#     Negative look-ahead assertion.
#
#   * (<==)
#     Positive look-behind assertion.
#
#   * (---)
#     A set of characters comprised of the first set minus each of the others.
#
#   * (...)
#     The argument variables that are passed to this rule. Either a single
#     value or a sequence of values.
#
#   * (case)
#     A variable indicated by `var` must match one of the other keys. The value
#     of the matching key pair is the next rule to be checked.
#
#   * (flip)
#     Some grammar rules like 136, don't attempt to match anything. They are
#     functions that change a variable. Rule 136 uses the (flip) function to
#     change a variable from one value to another.
#
#   * (if)
#     Check the rule indicated by the value. If it matches, call the (set)
#     function that must be provided.
#
#   * (set)
#     The value is a 2 element sequence. The first element is a variable and
#     the second is an expression. Set the variable to the value of the
#     evaluated expression.
#
#   * (ord)
#     Convert a character (1-9) to an integer.
#
#   * (match)
#     Return the string or character value of the last rule match.
#
#   * (len)
#     Return the length of a string value.
#
#   * (max)
#     The YAML spec grammar constrains some rules to complete in the next 1024
#     characters. The (max) function is used to indicate that this is the
#     case. How it is implemented (like many things) is left as an exercise for
#     the parser author.
#
#   * (exclude)
#     This one is a doozy. It indicates a rule that must not match during any
#     of the recursive sub-matches. Since it is used near the top of the
#     grammar, it affects almost everything.
#
#   * (+)
#     Return the first argument plus the second.
#
#   * (-)
#     Return the first argument minus the second.
#
#   * (<)
#     First argument is less than the second.
#
#   * (<=)
#     First argument is less than the second.
#
#   == Token Actions ==
#
# These three forms are libyeast's addition, and the grammar this was derived
# from has none of them. They say what the parser emits, which that grammar is
# silent about.
#
# The parser gathers the characters it consumes into a run, and gives the run a
# code. A run ends — becoming one token — wherever a (token) begins or ends, and
# wherever an (emit) falls. So an action does not make *a* token: it says what
# the characters consumed within it are called, and where the runs are cut. A
# nested action overrides the one around it for its own extent, and splits the
# outer run in two.
#
# A character consumed under no action at all is `unparsed` — what the parser
# says about input it could not parse. On the success path that is always an
# action someone forgot, so every rule that consumes a character is held to
# lying within one.
#
#   * (token)
#     A code, and the rule it covers. The characters that rule consumes carry
#     the code, but for those a nested action claims.
#
#       (token): [ indicator, '-' ]
#
#   * (wrap)
#     Two codes, and the rule they bracket: a zero-width marker before it, and
#     another after. The pair is written as one form so that a beginning cannot
#     lose its end.
#
#       (wrap): [ begin-anchor, end-anchor, { (all): [ c-anchor, ns-anchor-name ] } ]
#
#   * (emit)
#     A zero-width token at this point, which also cuts the run around it. Used
#     where a marker does not bracket a rule — a block scalar begins at its
#     indicator, but ends inside the rule that consumed its last line break.
#
#       (emit): begin-scalar
#
# The codes are those of the reference parser. Every character the parser
# consumes is one of:
#
#   * indicator -- a character that indicates structure
#   * text      -- content
#   * meta      -- consumed, but not content: an escape's payload, an anchor's
#                  name, the text of a comment
#   * indent    -- indentation spaces
#   * white     -- separation white space
#   * break     -- a line break that separates
#   * line-feed -- a line break a scalar keeps as content
#   * line-fold -- a line break a scalar folds to a space
#   * bom       -- a byte-order mark
#
# and the zero-width markers bracket what they name:
#
#   * begin-stream / end-stream, begin-document / end-document
#   * begin-node / end-node, begin-properties / end-properties
#   * begin-scalar / end-scalar, begin-sequence / end-sequence
#   * begin-mapping / end-mapping, begin-pair / end-pair
#   * begin-alias / end-alias, begin-anchor / end-anchor
#   * begin-tag / end-tag, begin-handle / end-handle
#   * begin-comment / end-comment, begin-directive / end-directive
#   * begin-escape / end-escape
#
# with directives-end and document-end for the `---` and `...` markers, and
# error, unparsed and detected for what the parser says when it cannot go on.
#
#===============================================================================

### 5.1. Character Set


#===============================================================================
# This is the complete set of characters allowed in a YAML stream.
#
# The (any) means that any one of the value group's rules must match for the
# group to match. The remaining rules are attempted in order.
#
# The rules beginning with `x` are hex codes. The pairs of hex codes are
# character ranges.
#===============================================================================

:001: c-printable
# c-printable ::=
#   x:9 | x:A | x:D | [x:20-x:7E]
#   | x:85 | [x:A0-x:D7FF] | [x:E000-x:FFFD]
#   | [x:10000-x:10FFFF]

c-printable:
  (any):
  - 'x09'
  - 'x0A'
  - 'x0D'
  - [ 'x20', 'x7E' ]
  - 'x85'
  - [ 'xA0', 'xD7FF' ]
  - [ 'xE000', 'xFFFD' ]
  - [ 'x010000', 'x10FFFF' ]



:002: nb-json
# nb-json ::=
#   x:9 | [x:20-x:10FFFF]

nb-json:
  (any):
  - 'x09'
  - [ 'x20', 'x10FFFF' ]



### 5.2. Character Encodings


#===============================================================================
# Rules 003-021 define single characters. These rules are never referenced in
# the rest of the grammar. They should at least be referenced in rule 022.
#===============================================================================

:003: c-byte-order-mark
# c-byte-order-mark ::=
#   x:FEFF
#
# libyeast reads UTF-8, and only UTF-8. YAML 1.2 asks a conformant parser to read UTF-16
# as well, and UTF-32 where it is to accept JSON, and libyeast does not: it detects no
# encoding, and this rule emits the mark it matched, nothing more.
#
# The reference parser instead gives this token the *name* of the encoding it detected as
# the token's text — "TF-8", "TF-16LE" — which is a divergence, and one the two token
# streams will differ on when they are compared.
#
# Emits: bom

c-byte-order-mark:
  (token): [ bom, 'xFEFF' ]



### 5.3. Indicator Characters


#===============================================================================
# Rules 004 to 021 are single characters to match. Instead of a hex code, they
# are specified as a single character in single quotes.
#===============================================================================

:004: c-sequence-entry
# c-sequence-entry ::=
#   '-'
#
# Emits: indicator

c-sequence-entry:
  (token): [ indicator, '-' ]



:005: c-mapping-key
# c-mapping-key ::=
#   '?'
#
# Emits: indicator

c-mapping-key:
  (token): [ indicator, '?' ]



:006: c-mapping-value
# c-mapping-value ::=
#   ':'
#
# Emits: indicator

c-mapping-value:
  (token): [ indicator, ':' ]



:007: c-collect-entry
# c-collect-entry ::=
#   ','
#
# Emits: indicator

c-collect-entry:
  (token): [ indicator, ',' ]



:008: c-sequence-start
# c-sequence-start ::=
#   '['
#
# Emits: indicator

c-sequence-start:
  (token): [ indicator, '[' ]



:009: c-sequence-end
# c-sequence-end ::=
#   ']'
#
# Emits: indicator

c-sequence-end:
  (token): [ indicator, ']' ]



:010: c-mapping-start
# c-mapping-start ::=
#   '{'
#
# Emits: indicator

c-mapping-start:
  (token): [ indicator, '{' ]



:011: c-mapping-end
# c-mapping-end ::=
#   '}'
#
# Emits: indicator

c-mapping-end:
  (token): [ indicator, '}' ]



:012: c-comment
# c-comment ::=
#   '#'
#
# Emits: indicator

c-comment:
  (token): [ indicator, '#' ]



:013: c-anchor
# c-anchor ::=
#   '&'
#
# Emits: indicator

c-anchor:
  (token): [ indicator, '&' ]



:014: c-alias
# c-alias ::=
#   '*'
#
# Emits: indicator

c-alias:
  (token): [ indicator, '*' ]



:015: c-tag
# c-tag ::=
#   '!'
#
# Emits: indicator

c-tag:
  (token): [ indicator, '!' ]



:016: c-literal
# c-literal ::=
#   '|'
#
# Emits: indicator

c-literal:
  (token): [ indicator, '|' ]



:017: c-folded
# c-folded ::=
#   '>'
#
# Emits: indicator

c-folded:
  (token): [ indicator, '>' ]



:018: c-single-quote
# c-single-quote ::=
#   '''
#
# Emits: indicator

c-single-quote:
  (token): [ indicator, '''' ]



:019: c-double-quote
# c-double-quote ::=
#   '"'
#
# Emits: indicator

c-double-quote:
  (token): [ indicator, '"' ]



:020: c-directive
# c-directive ::=
#   '%'
#
# Emits: indicator

c-directive:
  (token): [ indicator, '%' ]



:021: c-reserved
# c-reserved ::=
#   '@' | '`'
#
# Emits: indicator

c-reserved:
  (token):
  - indicator
  - (any):
    - '@'
    - '`'



#===============================================================================
# Rule 022 should probably be defined using the rule names above rather than
# literal characters.
#===============================================================================

:022: c-indicator
# c-indicator ::=
#   '-' | '?' | ':' | ',' | '[' | ']' | '{' | '}'
#   | '#' | '&' | '*' | '!' | '|' | '>' | ''' | '"'
#   | '%' | '@' | '`'

c-indicator:
  (any):
  - '-'
  - '?'
  - ':'
  - ','
  - '['
  - ']'
  - '{'
  - '}'
  - '#'
  - '&'
  - '*'
  - '!'
  - '|'
  - '>'
  - ''''
  - '"'
  - '%'
  - '@'
  - '`'



:023: c-flow-indicator
# c-flow-indicator ::=
#   ',' | '[' | ']' | '{' | '}'

c-flow-indicator:
  (any):
  - ','
  - '['
  - ']'
  - '{'
  - '}'



### 5.4. Line Break Characters


:024: b-line-feed
# b-line-feed ::=
#   x:A

b-line-feed: 'x0A'



:025: b-carriage-return
# b-carriage-return ::=
#   x:D

b-carriage-return: 'x0D'



#===============================================================================
# Rules can "call" other rules by name. This is called a rule reference. A
# reference matches if its named rule matches.
#===============================================================================

:026: b-char
# b-char ::=
#   b-line-feed | b-carriage-return

b-char:
  (any):
  - b-line-feed
  - b-carriage-return



#===============================================================================
# The (---) operator here matches if the next character is in the first range,
# but not in any of the following ranges.
#===============================================================================

:027: nb-char
# nb-char ::=
#   c-printable - b-char - c-byte-order-mark

nb-char:
  (---):
  - c-printable
  - b-char
  - c-byte-order-mark



#===============================================================================
# A rule in in a group of rules can be another group. This is how parenthesized
# groups are represented.
#
# The (all) function matches if all the rules in its group match.
#===============================================================================

:028: b-break
# b-break ::=
#   ( b-carriage-return b-line-feed )
#   | b-carriage-return
#   | b-line-feed

b-break:
  (any):
  - (all):
    - b-carriage-return
    - b-line-feed
  - b-carriage-return
  - b-line-feed



:029: b-as-line-feed
# b-as-line-feed ::=
#   b-break
#
# Emits: line-feed

b-as-line-feed:
  (token): [ line-feed, b-break ]



:030: b-non-content
# b-non-content ::=
#   b-break
#
# Emits: break

b-non-content:
  (token): [ break, b-break ]



### 5.5. White Space Characters


:031: s-space
# s-space ::=
#   x:20

s-space: 'x20'



:032: s-tab
# s-tab ::=
#   x:9

s-tab: 'x09'



:033: s-white
# s-white ::=
#   s-space | s-tab

s-white:
  (any):
  - s-space
  - s-tab



:034: ns-char
# ns-char ::=
#   nb-char - s-white

ns-char:
  (---):
  - nb-char
  - s-white



### 5.6. Miscellaneous Characters


:035: ns-dec-digit
# ns-dec-digit ::=
#   [x:30-x:39]

ns-dec-digit: [ 'x30', 'x39' ]



:036: ns-hex-digit
# ns-hex-digit ::=
#   ns-dec-digit
#   | [x:41-x:46] | [x:61-x:66]

ns-hex-digit:
  (any):
  - ns-dec-digit
  - [ 'x41', 'x46' ]
  - [ 'x61', 'x66' ]



:037: ns-ascii-letter
# ns-ascii-letter ::=
#   [x:41-x:5A] | [x:61-x:7A]

ns-ascii-letter:
  (any):
  - [ 'x41', 'x5A' ]
  - [ 'x61', 'x7A' ]



:038: ns-word-char
# ns-word-char ::=
#   ns-dec-digit | ns-ascii-letter | '-'

ns-word-char:
  (any):
  - ns-dec-digit
  - ns-ascii-letter
  - '-'



:039: ns-uri-char
# ns-uri-char ::=
#   '%' ns-hex-digit ns-hex-digit | ns-word-char | '#'
#   | ';' | '/' | '?' | ':' | '@' | '&' | '=' | '+' | '$' | ','
#   | '_' | '.' | '!' | '~' | '*' | ''' | '(' | ')' | '[' | ']'

ns-uri-char:
  (any):
  - (all):
    - '%'
    - ns-hex-digit
    - ns-hex-digit
  - ns-word-char
  - '#'
  - ';'
  - '/'
  - '?'
  - ':'
  - '@'
  - '&'
  - '='
  - '+'
  - '$'
  - ','
  - '_'
  - '.'
  - '!'
  - '~'
  - '*'
  - ''''
  - '('
  - ')'
  - '['
  - ']'



:040: ns-tag-char
# ns-tag-char ::=
#   ns-uri-char - '!' - c-flow-indicator

ns-tag-char:
  (---):
  - ns-uri-char
  - '!'
  - c-flow-indicator



### 5.7. Escaped Characters


:041: c-escape
# c-escape ::=
#   '\'
#
# Emits: indicator

c-escape:
  (token): [ indicator, '\' ]



:042: ns-esc-null
# ns-esc-null ::=
#   '0'
#
# Emits: meta

ns-esc-null:
  (token): [ meta, '0' ]



:043: ns-esc-bell
# ns-esc-bell ::=
#   'a'
#
# Emits: meta

ns-esc-bell:
  (token): [ meta, 'a' ]



:044: ns-esc-backspace
# ns-esc-backspace ::=
#   'b'
#
# Emits: meta

ns-esc-backspace:
  (token): [ meta, 'b' ]



:045: ns-esc-horizontal-tab
# ns-esc-horizontal-tab ::=
#   't' | x:9
#
# Emits: meta

ns-esc-horizontal-tab:
  (token):
  - meta
  - (any):
    - 't'
    - 'x09'



:046: ns-esc-line-feed
# ns-esc-line-feed ::=
#   'n'
#
# Emits: meta

ns-esc-line-feed:
  (token): [ meta, 'n' ]



:047: ns-esc-vertical-tab
# ns-esc-vertical-tab ::=
#   'v'
#
# Emits: meta

ns-esc-vertical-tab:
  (token): [ meta, 'v' ]



:048: ns-esc-form-feed
# ns-esc-form-feed ::=
#   'f'
#
# Emits: meta

ns-esc-form-feed:
  (token): [ meta, 'f' ]



:049: ns-esc-carriage-return
# ns-esc-carriage-return ::=
#   'r'
#
# Emits: meta

ns-esc-carriage-return:
  (token): [ meta, 'r' ]



:050: ns-esc-escape
# ns-esc-escape ::=
#   'e'
#
# Emits: meta

ns-esc-escape:
  (token): [ meta, 'e' ]



:051: ns-esc-space
# ns-esc-space ::=
#   x:20
#
# Emits: meta

ns-esc-space:
  (token): [ meta, 'x20' ]



:052: ns-esc-double-quote
# ns-esc-double-quote ::=
#   '"'
#
# The escaped character is the payload of the escape, not an indicator: this quotation
# mark is meta, where the one that opens a scalar (c-double-quote) is an indicator. The
# same character, told apart by the rule that consumed it.
#
# Emits: meta

ns-esc-double-quote:
  (token): [ meta, '"' ]



:053: ns-esc-slash
# ns-esc-slash ::=
#   '/'
#
# Emits: meta

ns-esc-slash:
  (token): [ meta, '/' ]



:054: ns-esc-backslash
# ns-esc-backslash ::=
#   '\'
#
# Emits: meta

ns-esc-backslash:
  (token): [ meta, '\' ]



:055: ns-esc-next-line
# ns-esc-next-line ::=
#   'N'
#
# Emits: meta

ns-esc-next-line:
  (token): [ meta, 'N' ]



:056: ns-esc-non-breaking-space
# ns-esc-non-breaking-space ::=
#   '_'
#
# Emits: meta

ns-esc-non-breaking-space:
  (token): [ meta, '_' ]



:057: ns-esc-line-separator
# ns-esc-line-separator ::=
#   'L'
#
# Emits: meta

ns-esc-line-separator:
  (token): [ meta, 'L' ]



:058: ns-esc-paragraph-separator
# ns-esc-paragraph-separator ::=
#   'P'
#
# Emits: meta

ns-esc-paragraph-separator:
  (token): [ meta, 'P' ]



#===============================================================================
# The ({x}) is a numeric quantifier. ie The rule must match that exact number
# of times.
#===============================================================================

:059: ns-esc-8-bit
# ns-esc-8-bit ::=
#   'x'
#   ( ns-hex-digit{2} )
#
# Emits: indicator, meta

ns-esc-8-bit:
  (all):
  - (token): [ indicator, 'x' ]
  - (token):
    - meta
    - ({2}): ns-hex-digit



:060: ns-esc-16-bit
# ns-esc-16-bit ::=
#   'u'
#   ( ns-hex-digit{4} )
#
# Emits: indicator, meta

ns-esc-16-bit:
  (all):
  - (token): [ indicator, 'u' ]
  - (token):
    - meta
    - ({4}): ns-hex-digit



:061: ns-esc-32-bit
# ns-esc-32-bit ::=
#   'U'
#   ( ns-hex-digit{8} )
#
# Emits: indicator, meta

ns-esc-32-bit:
  (all):
  - (token): [ indicator, 'U' ]
  - (token):
    - meta
    - ({8}): ns-hex-digit



:062: c-ns-esc-char
# c-ns-esc-char ::=
#   '\'
#   ( ns-esc-null | ns-esc-bell | ns-esc-backspace
#   | ns-esc-horizontal-tab | ns-esc-line-feed
#   | ns-esc-vertical-tab | ns-esc-form-feed
#   | ns-esc-carriage-return | ns-esc-escape | ns-esc-space
#   | ns-esc-double-quote | ns-esc-slash | ns-esc-backslash
#   | ns-esc-next-line | ns-esc-non-breaking-space
#   | ns-esc-line-separator | ns-esc-paragraph-separator
#   | ns-esc-8-bit | ns-esc-16-bit | ns-esc-32-bit )
#
# Emits: begin-escape, end-escape

c-ns-esc-char:
  (wrap):
  - begin-escape
  - end-escape
  - (all):
    - c-escape
    - (any):
      - ns-esc-null
      - ns-esc-bell
      - ns-esc-backspace
      - ns-esc-horizontal-tab
      - ns-esc-line-feed
      - ns-esc-vertical-tab
      - ns-esc-form-feed
      - ns-esc-carriage-return
      - ns-esc-escape
      - ns-esc-space
      - ns-esc-double-quote
      - ns-esc-slash
      - ns-esc-backslash
      - ns-esc-next-line
      - ns-esc-non-breaking-space
      - ns-esc-line-separator
      - ns-esc-paragraph-separator
      - ns-esc-8-bit
      - ns-esc-16-bit
      - ns-esc-32-bit



### 6.1. Indentation Spaces


#===============================================================================
# Some rules are intended to be called with arguments. Arguments are specified
# with the (...) key. A single argument is a scalar value. Multiple arguments
# are specified as a sequence.
#===============================================================================

:063: s-indent
# s-indent(n) ::=
#   s-space{n}
#
# Emits: indent

s-indent:
  (...): n
  (token):
  - indent
  - ({n}): s-space



#===============================================================================
# This rule means to match as many spaces as possible, then check the length of
# the match is less than the indentation level in variable n. The (<<<) means
# that if both assertions are not true, backtrack to where the rule started.
#
# The (***) function means the rule must match 0 or more times.
#
# The (<) function matches if the first argument is less than the second.
#
# The (len) function returns the length of a string, and the (match) function
# returns the last match.
#===============================================================================

:064: s-indent-lt
# s-indent(<n) ::=
#   s-space{m} <where_m_<_n>
#
# Emits: indent

s-indent-lt:
  (...): n
  (token):
  - indent
  - (<<<):
      (all):
      - (***): s-space
      - (<): [ { (len): (match) }, n ]



#===============================================================================
# The (<=) function matches if the first argument is less or equal to the
# second.
#===============================================================================

:065: s-indent-le
# s-indent(<=n) ::=
#   s-space{m} <where_m_<=_n>
#
# Emits: indent

s-indent-le:
  (...): n
  (token):
  - indent
  - (<<<):
      (all):
      - (***): s-space
      - (<=): [ { (len): (match) }, n ]



### 6.2. Separation Spaces


#===============================================================================
# The (+++) function means the rule must match 1 or more times.
#
# The <start-of-line> rule is a "special" rule. It's not defined in the
# grammar. It's an assertion that the current parse position is on a "start of
# line" boundary.
#===============================================================================

:066: s-separate-in-line
# s-separate-in-line ::=
#   s-white+ | <start_of_line>
#
# Emits: white

s-separate-in-line:
  (token):
  - white
  - (any):
    - (+++): s-white
    - <start-of-line>



### 6.3. Line Prefixes


#===============================================================================
# A (case) statement is a mapping that chooses the next rule based on the value
# of a state variable (in this case `c`).
#
# 7 rules in this grammar have (case) statements.
#===============================================================================

:067: s-line-prefix
# s-line-prefix(n,c) ::=
#   ( c = block-out => s-block-line-prefix(n) )
#   ( c = block-in => s-block-line-prefix(n) )
#   ( c = flow-out => s-flow-line-prefix(n) )
#   ( c = flow-in => s-flow-line-prefix(n) )

s-line-prefix:
  (...): [ n, c ]
  (case):
    var: c
    "block-in": { s-block-line-prefix: n }
    "block-out": { s-block-line-prefix: n }
    "flow-in": { s-flow-line-prefix: n }
    "flow-out": { s-flow-line-prefix: n }



:068: s-block-line-prefix
# s-block-line-prefix(n) ::=
#   s-indent(n)

s-block-line-prefix:
  (...): n
  s-indent: n



#===============================================================================
# The (???) function means the rule must match 0 or 1 times.
#===============================================================================

:069: s-flow-line-prefix
# s-flow-line-prefix(n) ::=
#   s-indent(n)
#   s-separate-in-line?

s-flow-line-prefix:
  (...): n
  (all):
  - s-indent: n
  - (???): s-separate-in-line



### 6.4. Empty Lines


:070: l-empty
# l-empty(n,c) ::=
#   ( s-line-prefix(n,c) | s-indent(<n) )
#   b-as-line-feed

l-empty:
  (...): [ n, c ]
  (all):
  - (any):
    - s-line-prefix: [ n, c ]
    - s-indent-lt: n
  - b-as-line-feed



### 6.5. Line Folding


:071: b-l-trimmed
# b-l-trimmed(n,c) ::=
#   b-non-content l-empty(n,c)+

b-l-trimmed:
  (...): [ n, c ]
  (all):
  - b-non-content
  - (+++): { l-empty: [ n, c ] }



:072: b-as-space
# b-as-space ::=
#   b-break
#
# Emits: line-fold

b-as-space:
  (token): [ line-fold, b-break ]



:073: b-l-folded
# b-l-folded(n,c) ::=
#   b-l-trimmed(n,c) | b-as-space

b-l-folded:
  (...): [ n, c ]
  (any):
  - b-l-trimmed: [ n, c ]
  - b-as-space



:074: s-flow-folded
# s-flow-folded(n) ::=
#   s-separate-in-line?
#   b-l-folded(n,flow-in)
#   s-flow-line-prefix(n)

s-flow-folded:
  (...): n
  (all):
  - (???): s-separate-in-line
  - b-l-folded: [ n, "flow-in" ]
  - s-flow-line-prefix: n



### 6.6. Comments


:075: c-nb-comment-text
# c-nb-comment-text ::=
#   '#' nb-char*
#
# Emits: begin-comment, meta, end-comment

c-nb-comment-text:
  (wrap):
  - begin-comment
  - end-comment
  - (all):
    - c-comment
    - (token):
      - meta
      - (***): nb-char



#===============================================================================
# The <end-of-stream> rule is a "special" rule that matches when there is no
# more text to parse.
#===============================================================================

:076: b-comment
# b-comment ::=
#   b-non-content | <end_of_file>

b-comment:
  (any):
  - b-non-content
  - <end-of-stream>



:077: s-b-comment
# s-b-comment ::=
#   ( s-separate-in-line
#   c-nb-comment-text? )?
#   b-comment

s-b-comment:
  (all):
  - (???):
      (all):
      - s-separate-in-line
      - (???): c-nb-comment-text
  - b-comment



:078: l-comment
# l-comment ::=
#   s-separate-in-line c-nb-comment-text?
#   b-comment

l-comment:
  (all):
  - s-separate-in-line
  - (???): c-nb-comment-text
  - b-comment



:079: s-l-comments
# s-l-comments ::=
#   ( s-b-comment | <start_of_line> )
#   l-comment*

s-l-comments:
  (all):
  - (any):
    - s-b-comment
    - <start-of-line>
  - (***): l-comment



### 6.7. Separation Lines


:080: s-separate
# s-separate(n,c) ::=
#   ( c = block-out => s-separate-lines(n) )
#   ( c = block-in => s-separate-lines(n) )
#   ( c = flow-out => s-separate-lines(n) )
#   ( c = flow-in => s-separate-lines(n) )
#   ( c = block-key => s-separate-in-line )
#   ( c = flow-key => s-separate-in-line )

s-separate:
  (...): [ n, c ]
  (case):
    var: c
    "block-in": { s-separate-lines: n }
    "block-key": s-separate-in-line
    "block-out": { s-separate-lines: n }
    "flow-in": { s-separate-lines: n }
    "flow-key": s-separate-in-line
    "flow-out": { s-separate-lines: n }



:081: s-separate-lines
# s-separate-lines(n) ::=
#   ( s-l-comments
#   s-flow-line-prefix(n) )
#   | s-separate-in-line

s-separate-lines:
  (...): n
  (any):
  - (all):
    - s-l-comments
    - s-flow-line-prefix: n
  - s-separate-in-line



### 6.8. Directives


:082: l-directive
# l-directive ::=
#   '%'
#   ( ns-yaml-directive
#   | ns-tag-directive
#   | ns-reserved-directive )
#   s-l-comments
#
# The markers bracket the directive itself. The comments that may follow it are not
# part of it.
#
# Emits: begin-directive, end-directive

l-directive:
  (all):
  - (wrap):
    - begin-directive
    - end-directive
    - (all):
      - c-directive
      - (any):
        - ns-yaml-directive
        - ns-tag-directive
        - ns-reserved-directive
  - s-l-comments



:083: ns-reserved-directive
# ns-reserved-directive ::=
#   ns-directive-name
#   ( s-separate-in-line ns-directive-parameter )*

ns-reserved-directive:
  (all):
  - ns-directive-name
  - (***):
      (all):
      - s-separate-in-line
      - ns-directive-parameter



:084: ns-directive-name
# ns-directive-name ::=
#   ns-char+
#
# Emits: meta

ns-directive-name:
  (token):
  - meta
  - (+++): ns-char



:085: ns-directive-parameter
# ns-directive-parameter ::=
#   ns-char+
#
# Emits: meta

ns-directive-parameter:
  (token):
  - meta
  - (+++): ns-char



##### 6.8.1. “YAML” Directives


:086: ns-yaml-directive
# ns-yaml-directive ::=
#   'Y' 'A' 'M' 'L'
#   s-separate-in-line ns-yaml-version
#
# Emits: meta

ns-yaml-directive:
  (token):
  - meta
  - (all):
    - 'Y'
    - 'A'
    - 'M'
    - 'L'
    - s-separate-in-line
    - ns-yaml-version



:087: ns-yaml-version
# ns-yaml-version ::=
#   ns-dec-digit+ '.' ns-dec-digit+
#
# Emits: meta

ns-yaml-version:
  (token):
  - meta
  - (all):
    - (+++): ns-dec-digit
    - '.'
    - (+++): ns-dec-digit



##### 6.8.2. “TAG” Directives


:088: ns-tag-directive
# ns-tag-directive ::=
#   'T' 'A' 'G'
#   s-separate-in-line c-tag-handle
#   s-separate-in-line ns-tag-prefix
#
# Emits: meta

ns-tag-directive:
  (token):
  - meta
  - (all):
    - 'T'
    - 'A'
    - 'G'
    - s-separate-in-line
    - c-tag-handle
    - s-separate-in-line
    - ns-tag-prefix



:089: c-tag-handle
# c-tag-handle ::=
#   c-named-tag-handle
#   | c-secondary-tag-handle
#   | c-primary-tag-handle

c-tag-handle:
  (any):
  - c-named-tag-handle
  - c-secondary-tag-handle
  - c-primary-tag-handle



:090: c-primary-tag-handle
# c-primary-tag-handle ::=
#   '!'
#
# Emits: begin-handle, end-handle

c-primary-tag-handle:
  (wrap): [ begin-handle, end-handle, c-tag ]



:091: c-secondary-tag-handle
# c-secondary-tag-handle ::=
#   '!' '!'
#
# Emits: begin-handle, end-handle

c-secondary-tag-handle:
  (wrap):
  - begin-handle
  - end-handle
  - (all):
    - c-tag
    - c-tag



:092: c-named-tag-handle
# c-named-tag-handle ::=
#   '!' ns-word-char+ '!'
#
# Emits: begin-handle, meta, end-handle

c-named-tag-handle:
  (wrap):
  - begin-handle
  - end-handle
  - (all):
    - c-tag
    - (token):
      - meta
      - (+++): ns-word-char
    - c-tag



:093: ns-tag-prefix
# ns-tag-prefix ::=
#   c-ns-local-tag-prefix | ns-global-tag-prefix
#
# Emits: begin-tag, end-tag

ns-tag-prefix:
  (wrap):
  - begin-tag
  - end-tag
  - (any):
    - c-ns-local-tag-prefix
    - ns-global-tag-prefix



:094: c-ns-local-tag-prefix
# c-ns-local-tag-prefix ::=
#   '!' ns-uri-char*
#
# Emits: meta

c-ns-local-tag-prefix:
  (all):
  - c-tag
  - (token):
    - meta
    - (***): ns-uri-char



:095: ns-global-tag-prefix
# ns-global-tag-prefix ::=
#   ns-tag-char ns-uri-char*
#
# Emits: meta

ns-global-tag-prefix:
  (token):
  - meta
  - (all):
    - ns-tag-char
    - (***): ns-uri-char



### 6.9. Node Properties


:096: c-ns-properties
# c-ns-properties(n,c) ::=
#   ( c-ns-tag-property
#   ( s-separate(n,c) c-ns-anchor-property )? )
#   | ( c-ns-anchor-property
#   ( s-separate(n,c) c-ns-tag-property )? )
#
# Emits: begin-properties, end-properties

c-ns-properties:
  (...): [ n, c ]
  (wrap):
  - begin-properties
  - end-properties
  - (any):
    - (all):
      - c-ns-tag-property
      - (???):
          (all):
          - s-separate: [ n, c ]
          - c-ns-anchor-property
    - (all):
      - c-ns-anchor-property
      - (???):
          (all):
          - s-separate: [ n, c ]
          - c-ns-tag-property



##### 6.9.1. Node Tags


:097: c-ns-tag-property
# c-ns-tag-property ::=
#   c-verbatim-tag
#   | c-ns-shorthand-tag
#   | c-non-specific-tag
#
# Emits: begin-tag, end-tag

c-ns-tag-property:
  (wrap):
  - begin-tag
  - end-tag
  - (any):
    - c-verbatim-tag
    - c-ns-shorthand-tag
    - c-non-specific-tag



:098: c-verbatim-tag
# c-verbatim-tag ::=
#   '!' '<' ns-uri-char+ '>'
#
# The angle brackets are indicators in their own right. The '>' is not c-folded: it
# closes the verbatim tag, and has nothing to do with a folded scalar.
#
# Emits: indicator, meta

c-verbatim-tag:
  (all):
  - c-tag
  - (token): [ indicator, < ]
  - (token):
    - meta
    - (+++): ns-uri-char
  - (token): [ indicator, '>' ]



:099: c-ns-shorthand-tag
# c-ns-shorthand-tag ::=
#   c-tag-handle ns-tag-char+
#
# Emits: meta

c-ns-shorthand-tag:
  (all):
  - c-tag-handle
  - (token):
    - meta
    - (+++): ns-tag-char



:100: c-non-specific-tag
# c-non-specific-tag ::=
#   '!'

c-non-specific-tag: c-tag



##### 6.9.2. Node Anchors


:101: c-ns-anchor-property
# c-ns-anchor-property ::=
#   '&' ns-anchor-name
#
# Emits: begin-anchor, end-anchor

c-ns-anchor-property:
  (wrap):
  - begin-anchor
  - end-anchor
  - (all):
    - c-anchor
    - ns-anchor-name



:102: ns-anchor-char
# ns-anchor-char ::=
#   ns-char - c-flow-indicator

ns-anchor-char:
  (---):
  - ns-char
  - c-flow-indicator



:103: ns-anchor-name
# ns-anchor-name ::=
#   ns-anchor-char+
#
# Emits: meta

ns-anchor-name:
  (token):
  - meta
  - (+++): ns-anchor-char



### 7.1. Alias Nodes


:104: c-ns-alias-node
# c-ns-alias-node ::=
#   '*' ns-anchor-name
#
# Emits: begin-alias, end-alias

c-ns-alias-node:
  (wrap):
  - begin-alias
  - end-alias
  - (all):
    - c-alias
    - ns-anchor-name



### 7.2. Empty Nodes


#===============================================================================
# The <empty> rule is a "special" rule that always matches (but consumes no
# text). It is used to for places in YAML that allow the absence of text to
# represent an empty plain scalar.
#===============================================================================

:105: e-scalar
# e-scalar ::=
#   <empty>
#
# Emits: begin-scalar, end-scalar

e-scalar:
  (wrap): [ begin-scalar, end-scalar, <empty> ]



:106: e-node
# e-node ::=
#   e-scalar
#
# Emits: begin-node, end-node

e-node:
  (wrap): [ begin-node, end-node, e-scalar ]



### 7.3. Flow Scalar Styles


##### 7.3.1. Double-Quoted Style


:107: nb-double-char
# nb-double-char ::=
#   c-ns-esc-char | ( nb-json - '\' - '"' )

nb-double-char:
  (any):
  - c-ns-esc-char
  - (---):
    - nb-json
    - '\'
    - '"'



:108: ns-double-char
# ns-double-char ::=
#   nb-double-char - s-white

ns-double-char:
  (---):
  - nb-double-char
  - s-white



:109: c-double-quoted
# c-double-quoted(n,c) ::=
#   '"' nb-double-text(n,c)
#   '"'
#
# Emits: begin-scalar, text, end-scalar

c-double-quoted:
  (...): [ n, c ]
  (wrap):
  - begin-scalar
  - end-scalar
  - (all):
    - c-double-quote
    - (token):
      - text
      - nb-double-text: [ n, c ]
    - c-double-quote



:110: nb-double-text
# nb-double-text(n,c) ::=
#   ( c = flow-out => nb-double-multi-line(n) )
#   ( c = flow-in => nb-double-multi-line(n) )
#   ( c = block-key => nb-double-one-line )
#   ( c = flow-key => nb-double-one-line )

nb-double-text:
  (...): [ n, c ]
  (case):
    var: c
    "block-key": nb-double-one-line
    "flow-in": { nb-double-multi-line: n }
    "flow-key": nb-double-one-line
    "flow-out": { nb-double-multi-line: n }



:111: nb-double-one-line
# nb-double-one-line ::=
#   nb-double-char*

nb-double-one-line: { (***): nb-double-char }



:112: s-double-escaped
# s-double-escaped(n) ::=
#   s-white* '\'
#   b-non-content
#   l-empty(n,flow-in)* s-flow-line-prefix(n)
#
# The escape brackets the backslash and the break it swallows. The white space around
# them is separation, and is not part of it.
#
# Emits: begin-escape, end-escape

s-double-escaped:
  (...): n
  (all):
  - (***): s-white
  - (wrap):
    - begin-escape
    - end-escape
    - (all):
      - c-escape
      - b-non-content
  - (***): { l-empty: [ n, "flow-in" ] }
  - s-flow-line-prefix: n



:113: s-double-break
# s-double-break(n) ::=
#   s-double-escaped(n) | s-flow-folded(n)

s-double-break:
  (...): n
  (any):
  - s-double-escaped: n
  - s-flow-folded: n



:114: nb-ns-double-in-line
# nb-ns-double-in-line ::=
#   ( s-white* ns-double-char )*

nb-ns-double-in-line:
  (***):
    (all):
    - (***): s-white
    - ns-double-char



:115: s-double-next-line
# s-double-next-line(n) ::=
#   s-double-break(n)
#   ( ns-double-char nb-ns-double-in-line
#   ( s-double-next-line(n) | s-white* ) )?

s-double-next-line:
  (...): n
  (all):
  - s-double-break: n
  - (???):
      (all):
      - ns-double-char
      - nb-ns-double-in-line
      - (any):
        - s-double-next-line: n
        - (***): s-white



:116: nb-double-multi-line
# nb-double-multi-line(n) ::=
#   nb-ns-double-in-line
#   ( s-double-next-line(n) | s-white* )

nb-double-multi-line:
  (...): n
  (all):
  - nb-ns-double-in-line
